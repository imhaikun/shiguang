name = "shiguang-api"
main = "server/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV 命名空间（运行 `wrangler kv:namespace create USERS_KV` 后填入 id）
[[kv_namespaces]]
binding = "USERS_KV"
id = "替换为你的KV命名空间ID"

# SMTP 配置（MailChannels 免费版已停止服务，建议使用其他邮件服务）
# 如果不需要邮件功能，可留空，忘记密码功能将不可用
[vars]
SMTP_HOST = ""
SMTP_PORT = "587"
SMTP_USER = ""
SMTP_PASS = ""
